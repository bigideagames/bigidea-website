<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // Single-page app redirect for GitHub Pages
      // Converts /path → /?p=/path so index.html can restore it
      var seg = location.pathname.slice(1);
      var query = location.search ? '&' + location.search.slice(1) : '';
      location.replace(
        location.origin + '/?p=/' + seg + query + location.hash
      );
    </script>
  </head>
  <body></body>
</html>
